<!DOCTYPE html>
<html lang="es-CO">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#002B5C" />
    <meta name="robots" content="noindex, nofollow" />
    <title>BTG ConnectAI · Iniciar sesión</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-card" aria-labelledby="auth-title">
        <header class="auth-brand">
          <p class="auth-brand__logo">BTG<span>Pactual</span></p>
          <p class="auth-brand__product">ConnectAI</p>
        </header>

        <h1 id="auth-title" class="auth-title">Iniciar sesión</h1>
        <p class="auth-subtitle">
          Autentícate para continuar con tu operación bancaria en WhatsApp.
        </p>

        <!-- Status / error message region (announced to assistive tech). -->
        <div
          id="status"
          class="auth-status"
          role="status"
          aria-live="polite"
          hidden
        ></div>

        <form id="login-form" class="auth-form" novalidate>
          <div class="auth-field">
            <label for="username">Usuario</label>
            <input
              type="text"
              id="username"
              name="username"
              autocomplete="username"
              autocapitalize="none"
              autocorrect="off"
              spellcheck="false"
              required
            />
          </div>

          <div class="auth-field">
            <label for="password">Contraseña</label>
            <input
              type="password"
              id="password"
              name="password"
              autocomplete="current-password"
              required
            />
          </div>

          <button type="submit" id="submit-btn" class="auth-submit">
            Ingresar
          </button>
        </form>

        <footer class="auth-footer">
          <p>Demo BTG Pactual Colombia · Uso exclusivo de prueba</p>
        </footer>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
