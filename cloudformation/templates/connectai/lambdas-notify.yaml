AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  BTG ConnectAI MVP - Notification Lambdas (nested stack de computo). Define las
  tres Lambdas del canal de notificaciones, todas FUERA de la VPC: otp-service
  (invocada por el TransferBrebStateMachine con el patron waitForTaskToken: genera
  el OTP, lo persiste en OTP_Store y lo envia por Pinpoint), email-service (consume
  la email-notification-queue de `infra` y envia la confirmacion por SES) y
  sms-service (consume la sms-notification-queue de `infra` y envia la confirmacion
  por Pinpoint). Las colas y sus DLQ las crea `infra`; aqui solo se crean las
  Lambdas y sus EventSourceMapping sobre los ARNs importados. Los IAM roles se
  definen en iam.yaml y se reciben como parametros. Nombres de funcion deterministas
  segun la convencion de naming (iam.yaml concede lambda:InvokeFunction contra el
  ARN exacto del otp-service).

# ─────────────────────────────────────────────────────────────────────────────
# Parameters
#
# Pasados desde el stack raiz (connectai-app.yaml, LambdasNotifyStack), que a su
# vez los resuelve del contrato cross-stack publicado por `infra` (SSM /
# Fn::ImportValue), del SharedLayer local y de los Outputs de iam.yaml (los ARNs
# de los roles). Los nombres DEBEN coincidir EXACTAMENTE con los que pasa el stack
# raiz en LambdasNotifyStack.
# ─────────────────────────────────────────────────────────────────────────────
Parameters:

  # ── Identidad de la app ──────────────────────────────────────────────────
  ProjectName:
    Type: String
    Default: 'BTGConnectAI'
    Description: Nombre del proyecto (prefijo de la convencion de naming del contrato).

  Environment:
    Type: String
    Default: 'sandbox'
    AllowedValues: ['sandbox', 'staging', 'prod']
    Description: Entorno de despliegue.

  # ── Empaquetado del codigo (bucket de artefactos de `infra`) ─────────────
  LambdaArtifactsBucketName:
    Type: String
    Description: >-
      Nombre del bucket de artefactos de Lambda creado por `infra`. El pipeline
      sube aqui los ZIP del codigo y este template los referencia en Code.S3Bucket.

  LambdaCodeKey:
    Type: String
    Description: >-
      Git-sha de los artefactos de Lambda. El S3Key se construye con la
      convencion lambdas/<name>-<git-sha>.zip.

  SharedLayerArn:
    Type: String
    Description: >-
      ARN (con version) del Lambda Layer compartido (deps pip + codigo
      src/shared/). Creado por la app y pasado desde el stack raiz.

  # ── DynamoDB (creada por `infra`) ────────────────────────────────────────
  OtpTableName:
    Type: String
    Description: >-
      Nombre de la tabla OTP_Store. Inyectado como env var OTP_TABLE_NAME del
      otp-service (donde persiste el OTP junto al task token de Step Functions).

  # ── SQS (colas de notificacion creadas por `infra`) ──────────────────────
  EmailQueueArn:
    Type: String
    Description: >-
      ARN de la email-notification-queue (contrato de `infra`). Fuente del
      EventSourceMapping del email-service. La cola y su DLQ las crea `infra`.

  SmsQueueArn:
    Type: String
    Description: >-
      ARN de la sms-notification-queue (contrato de `infra`). Fuente del
      EventSourceMapping del sms-service. La cola y su DLQ las crea `infra`.

  # ── Secrets (creado por `infra`) ─────────────────────────────────────────
  TwilioSecretArn:
    Type: String
    Description: >-
      ARN del secreto de Twilio en Secrets Manager (contrato de `infra`).
      Inyectado como env var TWILIO_SECRET_ARN del canal de notificaciones.

  # ── IAM roles (definidos en iam.yaml) ────────────────────────────────────
  OtpServiceRoleArn:
    Type: String
    Description: ARN del IAM role del otp-service (definido en iam.yaml).

  EmailServiceRoleArn:
    Type: String
    Description: ARN del IAM role del email-service (definido en iam.yaml).

  SmsServiceRoleArn:
    Type: String
    Description: ARN del IAM role del sms-service (definido en iam.yaml).

# ─────────────────────────────────────────────────────────────────────────────
# Metadata - agrupacion de parametros en la consola de CloudFormation
# ─────────────────────────────────────────────────────────────────────────────
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: 'App'
        Parameters:
          - ProjectName
          - Environment
      - Label:
          default: 'Empaquetado del codigo'
        Parameters:
          - LambdaArtifactsBucketName
          - LambdaCodeKey
          - SharedLayerArn
      - Label:
          default: 'Contrato cross-stack: DynamoDB / SQS / Secrets'
        Parameters:
          - OtpTableName
          - EmailQueueArn
          - SmsQueueArn
          - TwilioSecretArn
      - Label:
          default: 'IAM roles (iam.yaml)'
        Parameters:
          - OtpServiceRoleArn
          - EmailServiceRoleArn
          - SmsServiceRoleArn

# ─────────────────────────────────────────────────────────────────────────────
# Resources
#
# Las tres Lambdas corren FUERA de la VPC (Pinpoint / SES / Step Functions son
# APIs publicas). Naming determinista ${ProjectName}-${Environment}-<name>:
# iam.yaml concede a la state-machine role lambda:InvokeFunction contra el ARN
# exacto del otp-service, por lo que el FunctionName NO puede autogenerarse.
# Handler: <paquete>.handler.handler (el ZIP empaqueta el paquete en la raiz).
# ─────────────────────────────────────────────────────────────────────────────
Resources:

  # ── otp-service (estado GenerateOTP, waitForTaskToken, Req 16.1/16.2/16.3) ──
  # Invocada SOLO por el TransferBrebStateMachine con el task token en el payload:
  # genera el OTP, lo persiste en OTP_Store junto al task token y lo envia por SMS
  # (Pinpoint). Retorna de inmediato; la state machine queda suspendida esperando
  # el callback (SendTaskSuccess / SendTaskFailure) del Message_Processor.
  OtpServiceFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-${Environment}-otp-service'
      Description: >-
        Genera el OTP, lo persiste en OTP_Store con el task token de Step Functions
        y lo envia por SMS (Pinpoint). Invocada por el TransferBrebStateMachine con
        el patron waitForTaskToken. Fuera de la VPC.
      Runtime: python3.13
      Handler: otp_service.handler.handler
      MemorySize: 128
      Timeout: 10
      Role: !Ref OtpServiceRoleArn
      Code:
        S3Bucket: !Ref LambdaArtifactsBucketName
        S3Key: !Sub 'lambdas/otp-service-${LambdaCodeKey}.zip'
      Layers:
        - !Ref SharedLayerArn
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          OTP_TABLE_NAME: !Ref OtpTableName
          TWILIO_SECRET_ARN: !Ref TwilioSecretArn
          POWERTOOLS_SERVICE_NAME: otp-service
          POWERTOOLS_LOG_LEVEL: INFO
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref ProjectName
        - Key: ManagedBy
          Value: cloudformation

  # ── email-service (consumidor de la email-notification-queue, Req 17.3/17.4) ─
  # Envia la confirmacion de transferencia por SES. La cola y su DLQ las crea
  # `infra`; aqui solo el EventSourceMapping sobre el ARN importado.
  EmailServiceFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-${Environment}-email-service'
      Description: >-
        Consume la email-notification-queue y envia la confirmacion de
        transferencia por Amazon SES (con partial-batch-failure reporting).
        Fuera de la VPC.
      Runtime: python3.13
      Handler: email_service.handler.handler
      MemorySize: 256
      Timeout: 30
      Role: !Ref EmailServiceRoleArn
      Code:
        S3Bucket: !Ref LambdaArtifactsBucketName
        S3Key: !Sub 'lambdas/email-service-${LambdaCodeKey}.zip'
      Layers:
        - !Ref SharedLayerArn
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          TWILIO_SECRET_ARN: !Ref TwilioSecretArn
          POWERTOOLS_SERVICE_NAME: email-service
          POWERTOOLS_LOG_LEVEL: INFO
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref ProjectName
        - Key: ManagedBy
          Value: cloudformation

  # ── EventSourceMapping: email-notification-queue → email-service ────────────
  # BatchSize 10, ventana de batching de 5s y ReportBatchItemFailures (un mensaje
  # malo se reintenta solo, sin re-drivear todo el batch; Req 17.3).
  EmailQueueEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !Ref EmailQueueArn
      FunctionName: !Ref EmailServiceFunction
      Enabled: true
      BatchSize: 10
      MaximumBatchingWindowInSeconds: 5
      FunctionResponseTypes:
        - ReportBatchItemFailures

  # ── sms-service (consumidor de la sms-notification-queue, Req 17.2/17.8) ─────
  # Envia la confirmacion de transferencia por SMS (Pinpoint). La cola y su DLQ
  # las crea `infra`; aqui solo el EventSourceMapping sobre el ARN importado.
  SmsServiceFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-${Environment}-sms-service'
      Description: >-
        Consume la sms-notification-queue y envia la confirmacion de transferencia
        por SMS (Pinpoint) con partial-batch-failure reporting. Fuera de la VPC.
      Runtime: python3.13
      Handler: sms_service.handler.handler
      MemorySize: 128
      Timeout: 15
      Role: !Ref SmsServiceRoleArn
      Code:
        S3Bucket: !Ref LambdaArtifactsBucketName
        S3Key: !Sub 'lambdas/sms-service-${LambdaCodeKey}.zip'
      Layers:
        - !Ref SharedLayerArn
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          TWILIO_SECRET_ARN: !Ref TwilioSecretArn
          POWERTOOLS_SERVICE_NAME: sms-service
          POWERTOOLS_LOG_LEVEL: INFO
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref ProjectName
        - Key: ManagedBy
          Value: cloudformation

  # ── EventSourceMapping: sms-notification-queue → sms-service ────────────────
  # BatchSize 10, ventana de batching de 5s y ReportBatchItemFailures (un mensaje
  # malo se reintenta solo, sin re-drivear todo el batch; Req 17.5).
  SmsQueueEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !Ref SmsQueueArn
      FunctionName: !Ref SmsServiceFunction
      Enabled: true
      BatchSize: 10
      MaximumBatchingWindowInSeconds: 5
      FunctionResponseTypes:
        - ReportBatchItemFailures

# ─────────────────────────────────────────────────────────────────────────────
# Outputs
#
# Consumidos por el stack raiz: OtpServiceFunctionArn va como task OtpService al
# TransferBrebStateMachine; los de email/sms se exportan para trazabilidad.
# ─────────────────────────────────────────────────────────────────────────────
Outputs:
  OtpServiceFunctionArn:
    Description: ARN de la Lambda otp-service (task GenerateOTP del state machine).
    Value: !GetAtt OtpServiceFunction.Arn
    Export:
      Name: !Sub '${ProjectName}-${Environment}-OtpServiceFunctionArn'

  EmailServiceFunctionArn:
    Description: ARN de la Lambda email-service (consumidor de la email queue).
    Value: !GetAtt EmailServiceFunction.Arn
    Export:
      Name: !Sub '${ProjectName}-${Environment}-EmailServiceFunctionArn'

  SmsServiceFunctionArn:
    Description: ARN de la Lambda sms-service (consumidor de la sms queue).
    Value: !GetAtt SmsServiceFunction.Arn
    Export:
      Name: !Sub '${ProjectName}-${Environment}-SmsServiceFunctionArn'
